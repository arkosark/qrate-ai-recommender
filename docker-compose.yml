version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_DB: menucrawler
      POSTGRES_USER: qrate
      POSTGRES_PASSWORD: localpassword
    ports:
      - "5432:5432"
    volumes:
      - ./migrations:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qrate -d menucrawler"]
      interval: 5s
      timeout: 5s
      retries: 10

  localstack:
    image: localstack/localstack:3.0
    environment:
      SERVICES: dynamodb
      DEFAULT_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
    ports:
      - "4566:4566"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4566/_localstack/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  bedrock-mock:
    image: wiremock/wiremock:3.3.1
    ports:
      - "8080:8080"
    volumes:
      - ./tests/mocks/bedrock:/home/wiremock/mappings
    command: ["--verbose"]

  recommender:
    build: .
    ports:
      - "8004:8004"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: qrate
      DB_PASSWORD: localpassword
      DB_NAME: menucrawler
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      DYNAMODB_SESSIONS_TABLE: recommendation-sessions-local
      DYNAMODB_ENDPOINT: http://localstack:4566
      BEDROCK_MODEL_ID: anthropic.claude-sonnet-4-6
      TITAN_EMBEDDING_MODEL_ID: amazon.titan-embed-text-v2:0
      BEDROCK_ENDPOINT: http://bedrock-mock:8080
      COGNITO_USER_POOL_ID: local-pool
      COGNITO_APP_CLIENT_ID: local-client
      COGNITO_REGION: us-east-1
      WEATHER_API_KEY: test
      PREDICTHQ_API_KEY: test
      ENVIRONMENT: local
      PORT: 8004
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
      bedrock-mock:
        condition: service_started

volumes:
  postgres_data:
